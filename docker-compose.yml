version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
    depends_on:
      scraper-service:
        condition: service_healthy
    networks:
      - foretrust-internal

  scraper-service:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
    volumes:
      - scraper-exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - foretrust-internal

networks:
  foretrust-internal:
    driver: bridge

volumes:
  scraper-exports:
